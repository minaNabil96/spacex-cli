name: CI — Space Launch Tracker CLI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-claude:
    name: Test Claude Version (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: version1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Run tests with coverage
        run: |
          python -c "import spacex_cli; print(f'Importing from: {spacex_cli.__file__}')"
          pytest

  test-gemini:
    name: Test Gemini Version (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: version2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/

      - name: Run tests with coverage
        run: |
          python -c "import spacex_cli; print(f'Importing from: {spacex_cli.__file__}')"
          pytest
